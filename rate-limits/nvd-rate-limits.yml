specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: NVD
providerId: nvd
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Security
  - CVE
  - CPE
  - Vulnerability
  - CVSS
  - Rate Limiting
description: NVD enforces rolling 30-second windows. Without an API key, clients are limited to 5 requests
  per 30 seconds; with a free API key, 50 requests per 30 seconds. NVD recommends sleeping 6 seconds between
  requests to stay below the threshold. Limits are per public IP (anonymous) or per API key. Exceeding
  the threshold returns 403 with a temporary block.
sources:
  - https://nvd.nist.gov/developers/start-here
  - https://nvd.nist.gov/developers/request-an-api-key
responseCodes:
  throttled: 403
  serviceUnavailable: 503
limits:
  - name: Anonymous (no API key)
    scope: IP
    metric: requests_per_30s
    limit: 5
    timeFrame: 30 seconds
    notes: Rolling 30-second window across all NVD endpoints.
    applies:
      - NVD CVE API
      - NVD CVE Change History API
      - NVD CPE API
      - NVD CPE Match Criteria API
      - NVD Source API
      - National Vulnerability Database API
  - name: With API Key
    scope: api-key
    metric: requests_per_30s
    limit: 50
    timeFrame: 30 seconds
    notes: Rolling 30-second window. Pass the key via the apiKey query parameter or X-API-KEY header.
    applies:
      - NVD CVE API
      - NVD CVE Change History API
      - NVD CPE API
      - NVD CPE Match Criteria API
      - NVD Source API
      - National Vulnerability Database API
policies:
  - name: Recommended sleep interval
    description: NVD recommends sleeping at least 6 seconds between requests to stay safely under the
      rolling 30-second window.
  - name: Backoff
    description: On throttling (403), pause and resume after the rolling window resets. Implement exponential
      backoff for repeated throttle responses.
  - name: Pagination
    description: Use the resultsPerPage and startIndex parameters (max 2000 for CVEs, 10000 for CPEs)
      to retrieve large result sets within the rate limit.
  - name: Terms of use
    description: Use of NVD data is subject to the NVD Terms of Use; commercial use is permitted with
      attribution.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
