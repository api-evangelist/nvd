    type: OpenAPI
  description: >-
    The NVD CVE Change History API tracks modifications to CVE records over time, enabling consumers to identify updated vulnerability data and synchronize their local databases with incremental changes rather than full reloads.
- aid: nvd:nvd-cpe-api
  name: NVD CPE API
  tags:
  - Security
  - CPE
  - Vulnerability
  - Product Enumeration
  image: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/image.png
  humanURL: https://nvd.nist.gov/developers/products
  baseURL: https://services.nvd.nist.gov/rest/json/cpes/2.0
  properties:
  - url: https://nvd.nist.gov/developers/products
    type: Documentation
  - url: https://nvd.nist.gov/developers/start-here
    type: GettingStarted
  - url: https://nvd.nist.gov/developers/request-an-api-key
    type: Authentication
  - url: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/openapi/nvd-cve-openapi.yml
    type: OpenAPI
  description: >-
    The NVD CPE (Common Platform Enumeration) API provides access to the authoritative CPE dictionary, enabling lookup of software and hardware product identifiers. Supports filtering by CPE name, match string, keyword, and modification date. Returns up to 10,000 results per page.
- aid: nvd:nvd-cpe-match-api
  name: NVD CPE Match Criteria API
  tags:
  - Security
  - CPE
  - Vulnerability
  - Match Criteria
  image: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/image.png
  humanURL: https://nvd.nist.gov/developers/products
  baseURL: https://services.nvd.nist.gov/rest/json/cpematch/2.0
  properties:
  - url: https://nvd.nist.gov/developers/products
    type: Documentation
  - url: https://nvd.nist.gov/developers/start-here
    type: GettingStarted
  - url: https://nvd.nist.gov/developers/request-an-api-key
    type: Authentication
  - url: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/openapi/nvd-cve-openapi.yml
    type: OpenAPI
  description: >-
    The NVD CPE Match Criteria API retrieves CPE match strings associated with CVE records, enabling detailed product-to-vulnerability mapping. Supports filtering by CVE ID, match criteria ID, and match string patterns. Returns up to 500 results per page.
- aid: nvd:nvd-source-api
