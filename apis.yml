    type: Documentation
  - url: https://nvd.nist.gov/developers/start-here
    type: GettingStarted
  - url: https://nvd.nist.gov/developers/request-an-api-key
    type: Authentication
  - url: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/openapi/nvd-cve-openapi.yml
    type: OpenAPI
  description: >-
    The NVD Source API provides information about the organizations that contribute vulnerability data to the NVD dataset, enabling consumers to understand data provenance. Returns up to 1,000 source records per page. Data changes infrequently; once daily updates recommended.
- aid: nvd:nvd-api
  name: National Vulnerability Database API
  tags:
  - Security
  - CVE
  - Vulnerability
  - RSS
  - XML
  image: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/image.png
  humanURL: https://nvd.nist.gov/developers
  baseURL: https://services.nvd.nist.gov/rest/json/cves/2.0
  properties:
  - url: https://nvd.nist.gov/developers
    type: Documentation
  description: >-
    The National Vulnerability Database (NVD) provides REST and RSS/Atom APIs for CVE (Common Vulnerabilities and Exposures) data. APIs deliver vulnerability descriptions, CVSS severity scores, affected product lists, and reference links for security monitoring and dependency alerting.
