apis:
- aid: nvd:nvd-cve-api
  name: NVD CVE API
  tags:
  - Security
  - CVE
  - Vulnerability
  - CVSS
  image: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/image.png
  humanURL: https://nvd.nist.gov/developers/vulnerabilities
  baseURL: https://services.nvd.nist.gov/rest/json/cves/2.0
  properties:
  - url: https://nvd.nist.gov/developers/vulnerabilities
    type: Documentation
  - url: https://nvd.nist.gov/developers/start-here
    type: GettingStarted
  - url: https://nvd.nist.gov/developers/request-an-api-key
    type: Authentication
  - url: https://nvd.nist.gov/developers/start-here
    type: RateLimits
  - url: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/openapi/nvd-cve-openapi.yml
    type: OpenAPI
  - url: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/json-schema/nvd-cve-schema.json
    type: JSONSchema
  - url: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/json-ld/nvd-context.jsonld
    type: JSONLDContext
  description: >-
    The NVD CVE API provides programmatic access to CVE (Common Vulnerabilities and Exposures) records including CVSS severity scores, affected product lists, CWE classifications, and reference links. Supports filtering by CVE ID, CVSS metrics, CWE, keyword, modification date, and publication date. Without an API key: 5 requests per 30 seconds; with key: 50 requests per 30 seconds.
- aid: nvd:nvd-cve-change-history-api
  name: NVD CVE Change History API
  tags:
  - Security
  - CVE
  - Vulnerability
  - Change History
  image: https://raw.githubusercontent.com/api-evangelist/nvd/refs/heads/main/image.png
