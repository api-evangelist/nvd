naftiko: 1.0.0-alpha2
info:
  label: NVD CVE API
  description: 'The NVD CVE API provides programmatic access to CVE (Common Vulnerabilities and Exposures) records including
    CVSS severity scores, affected product lists, CWE classifications, and reference links. Without an API key: 5 requests
    per 30 seconds; with key: 50 requests per 30 seconds.'
  tags:
  - Nvd
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: nvd
    baseUri: https://services.nvd.nist.gov/rest/json
    description: NVD CVE API HTTP API.
    authentication:
      type: apikey
      in: header
      name: apiKey
      value: '{{NVD_TOKEN}}'
    resources:
    - name: cves-2-0
      path: /cves/2.0
      operations:
      - name: getcves
        method: GET
        description: Get CVE records
        inputParameters:
        - name: cveId
          in: query
          type: string
          description: Specific CVE ID (e.g., CVE-2021-44228)
        - name: keywordSearch
          in: query
          type: string
          description: Free text search across CVE description
        - name: keywordExactMatch
          in: query
          type: boolean
          description: Require exact keyword match when true
        - name: cvssV3Severity
          in: query
          type: string
          description: Filter by CVSS v3.x base severity
        - name: cvssV2Severity
          in: query
          type: string
          description: Filter by CVSS v2.0 base severity
        - name: cvssV3Metrics
          in: query
          type: string
          description: Filter by CVSS v3 vector string
        - name: cweId
          in: query
          type: string
          description: CWE weakness ID (e.g., CWE-79)
        - name: cpeName
          in: query
          type: string
          description: CPE 2.3 formatted string to find CVEs affecting a specific product
        - name: isVulnerable
          in: query
          type: boolean
          description: When true, only return CVEs where the CPE match is vulnerable (must use cpeName)
        - name: virtualMatchString
          in: query
          type: string
          description: CPE match string with wildcards
        - name: pubStartDate
          in: query
          type: string
          description: CVE publication start date (ISO 8601, max 120-day range)
        - name: pubEndDate
          in: query
          type: string
        - name: lastModStartDate
          in: query
          type: string
          description: Last modification start date
        - name: lastModEndDate
          in: query
          type: string
        - name: sourceIdentifier
          in: query
          type: string
          description: CVE source organization identifier
        - name: hasKev
          in: query
          type: boolean
          description: When true, only return CVEs in CISA's Known Exploited Vulnerabilities catalog
        - name: hasCertAlerts
          in: query
          type: boolean
        - name: hasCertNotes
          in: query
          type: boolean
        - name: hasOval
          in: query
          type: boolean
        - name: noRejected
          in: query
          type: boolean
          description: Exclude CVEs with REJECTED status
        - name: resultsPerPage
          in: query
          type: integer
          description: Number of results per page (max 2000)
        - name: startIndex
          in: query
          type: integer
          description: Zero-based start index for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cvehistory-2-0
      path: /cvehistory/2.0
      operations:
      - name: getcvechangehistory
        method: GET
        description: Get CVE change history
        inputParameters:
        - name: cveId
          in: query
          type: string
        - name: changeStartDate
          in: query
          type: string
          required: true
        - name: changeEndDate
          in: query
          type: string
          required: true
        - name: eventName
          in: query
          type: string
        - name: resultsPerPage
          in: query
          type: integer
        - name: startIndex
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cpes-2-0
      path: /cpes/2.0
      operations:
      - name: getcpes
        method: GET
        description: Get CPE (Common Platform Enumeration) records
        inputParameters:
        - name: cpeNameId
          in: query
          type: string
          description: CPE UUID identifier
        - name: cpeMatchString
          in: query
          type: string
          description: CPE 2.3 match string (wildcards supported)
        - name: keywordSearch
          in: query
          type: string
        - name: keywordExactMatch
          in: query
          type: boolean
        - name: lastModStartDate
          in: query
          type: string
        - name: lastModEndDate
          in: query
          type: string
        - name: matchCriteriaId
          in: query
          type: string
        - name: resultsPerPage
          in: query
          type: integer
        - name: startIndex
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cpematch-2-0
      path: /cpematch/2.0
      operations:
      - name: getcpematch
        method: GET
        description: Get CPE match criteria
        inputParameters:
        - name: cveId
          in: query
          type: string
        - name: matchCriteriaId
          in: query
          type: string
        - name: lastModStartDate
          in: query
          type: string
        - name: lastModEndDate
          in: query
          type: string
        - name: resultsPerPage
          in: query
          type: integer
        - name: startIndex
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: source-2-0
      path: /source/2.0
      operations:
      - name: getsources
        method: GET
        description: Get NVD data sources
        inputParameters:
        - name: sourceIdentifier
          in: query
          type: string
        - name: lastModStartDate
          in: query
          type: string
        - name: lastModEndDate
          in: query
          type: string
        - name: resultsPerPage
          in: query
          type: integer
        - name: startIndex
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: nvd-rest
    description: REST adapter for NVD CVE API.
    resources:
    - path: /cves/2.0
      name: getcves
      operations:
      - method: GET
        name: getcves
        description: Get CVE records
        call: nvd.getcves
        outputParameters:
        - type: object
          mapping: $.
    - path: /cvehistory/2.0
      name: getcvechangehistory
      operations:
      - method: GET
        name: getcvechangehistory
        description: Get CVE change history
        call: nvd.getcvechangehistory
        outputParameters:
        - type: object
          mapping: $.
    - path: /cpes/2.0
      name: getcpes
      operations:
      - method: GET
        name: getcpes
        description: Get CPE (Common Platform Enumeration) records
        call: nvd.getcpes
        outputParameters:
        - type: object
          mapping: $.
    - path: /cpematch/2.0
      name: getcpematch
      operations:
      - method: GET
        name: getcpematch
        description: Get CPE match criteria
        call: nvd.getcpematch
        outputParameters:
        - type: object
          mapping: $.
    - path: /source/2.0
      name: getsources
      operations:
      - method: GET
        name: getsources
        description: Get NVD data sources
        call: nvd.getsources
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: nvd-mcp
    transport: http
    description: MCP adapter for NVD CVE API for AI agent use.
