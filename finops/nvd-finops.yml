    tags:
      - Security
      - CVE
      - Vulnerability
      - Change History
    serviceName: NVD CVE Change History API
    serviceCategory: Security Data
  - name: NVD CPE API
    baseURL: https://services.nvd.nist.gov/rest/json/cpes/2.0
    tags:
      - Security
      - CPE
      - Product Enumeration
    serviceName: NVD CPE API
    serviceCategory: Security Data
  - name: NVD CPE Match Criteria API
    baseURL: https://services.nvd.nist.gov/rest/json/cpematch/2.0
    tags:
      - Security
      - CPE
      - Match Criteria
    serviceName: NVD CPE Match Criteria API
    serviceCategory: Security Data
  - name: NVD Source API
    baseURL: https://services.nvd.nist.gov/rest/json/source/2.0
    tags:
      - Security
      - Data Sources
      - Organizations
    serviceName: NVD Source API
    serviceCategory: Security Data
unitEconomics:
  - name: Requests per CVE refresh
    metric: api_requests / cve_records_fetched
    target: minimize via lastModStartDate delta sync
  - name: Cache hit ratio
    metric: cache_hits / (cache_hits + api_requests)
    target: '> 0.9 for steady-state CVE/CPE lookups'
maintainers:
